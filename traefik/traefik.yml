api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: tasknest

certificatesResolvers:
  letsencrypt:
    acme:
      # Placeholder uniquement — surchargé au déploiement par la variable
      # ACME_EMAIL (flag CLI Traefik, cf. docker-compose.prod.yml). Aucune
      # donnée personnelle / infra réelle dans le dépôt public.
      email: admin@example.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog: {}
