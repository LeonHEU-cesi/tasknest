name: Bug report
description: Report a bug or regression
title: "[bug] "
labels: ["type-fix"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where does it happen?
      options:
        - api
        - web
        - mobile-ios
        - mobile-android
        - sync-google
        - sync-microsoft
        - sync-apple-caldav
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tasknest version or commit SHA
      placeholder: "v0.5.0 or abc1234"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, mobile device, etc.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
    validations:
      required: false
