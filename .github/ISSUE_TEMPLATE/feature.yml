name: Feature request
description: Suggest a new feature or enhancement
title: "[feat] "
labels: ["type-feat"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please fill out the form below.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: "Currently, I have to ... which is painful because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
      placeholder: "Add a button in the toolbar that ..."
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the app is affected?
      options:
        - api
        - web
        - mobile
        - types
        - ui
        - config
        - ci
        - docs
        - cross-cutting
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - auth
        - tasks
        - views
        - sync
        - notifs
        - sharing
        - admin
        - i18n
        - a11y
        - sec
        - rgpd
        - oss
        - other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references...
    validations:
      required: false
